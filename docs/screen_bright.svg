<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
<!-- bg -->
<rect width="320" height="240" fill="#000000"/>

<!-- Header -->
<rect x="0" y="0" width="320" height="30" fill="#2C2C2C"/>
<rect x="0"   y="0" width="80"  height="30" rx="6" fill="#444444"/>
<text x="40"  y="19" text-anchor="middle" fill="#000000" font-size="13" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">← Back</text>
<text x="160" y="19" text-anchor="middle" fill="#00CC44" font-size="13" font-family="'Segoe UI',Arial,sans-serif">✓ ATU  -35dBm</text>
<rect x="240" y="0" width="80"  height="30" rx="6" fill="#444444"/>
<text x="280" y="19" text-anchor="middle" fill="#000000" font-size="13" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">CAL →</text>

<!-- sep y=30 -->
<rect x="0" y="30" width="320" height="1" fill="#2C2C58"/>

<!-- Brightness label -->
<text x="160" y="52" text-anchor="middle" fill="#8585B1" font-size="14" font-family="'Segoe UI',Arial,sans-serif">Brightness</text>

<!-- Brightness slider: x=20 y=64 w=280 h=12, value 78% -->
<rect x="20"  y="64" width="280" height="12" rx="6" fill="#2C2C2C"/>
<rect x="20"  y="64" width="218" height="12" rx="6" fill="#4488CC"/>
<circle cx="238" cy="70" r="10" fill="#AADDFF"/>

<!-- sep y=100 -->
<rect x="0" y="100" width="320" height="1" fill="#2C2C58"/>

<!-- Unpair button: x=10 y=108 w=300 h=48 -->
<rect x="10" y="108" width="300" height="48" rx="10" fill="#1A3A1A"/>
<text x="160" y="136" text-anchor="middle" fill="#00CC44" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">⛓ PAIRED — hold 2s to unpair</text>

<!-- Version label -->
<text x="160" y="228" text-anchor="middle" fill="#585858" font-size="14" font-family="'Segoe UI',Arial,sans-serif">SW v1.04</text>

</svg>
