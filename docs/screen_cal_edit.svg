<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
<!-- bg -->
<rect width="320" height="240" fill="#000000"/>

<!-- Header -->
<rect x="0" y="0" width="320" height="30" fill="#2C2C2C"/>
<rect x="0"  y="0" width="80" height="30" rx="6" fill="#444444"/>
<text x="40" y="19" text-anchor="middle" fill="#000000" font-size="13" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">← Back</text>
<text x="200" y="19" text-anchor="middle" fill="#EE0000" font-size="13" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">⚠ SYSTEM SETTINGS</text>

<!-- sep y=30 -->
<rect x="0" y="30" width="320" height="1" fill="#2C2C58"/>

<!-- Param buttons row 0 (y=30) -->
<rect x="2"   y="30" width="75" height="24" rx="4" fill="#2A4A6A"/>
<text x="39"  y="46" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">K</text>
<!-- active outline -->
<rect x="2"   y="30" width="75" height="24" rx="4" fill="none" stroke="#58B1FF" stroke-width="1"/>

<rect x="81"  y="30" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="118" y="46" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">M</text>
<rect x="160" y="30" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="197" y="46" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">D</text>
<rect x="239" y="30" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="276" y="46" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">S</text>

<!-- Param buttons row 1 (y=58) -->
<rect x="2"   y="58" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="39"  y="74" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">R</text>
<rect x="81"  y="58" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="118" y="74" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">W</text>
<rect x="160" y="58" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="197" y="74" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">V</text>
<rect x="239" y="58" width="75" height="24" rx="4" fill="#1A2A3A"/>
<text x="276" y="74" text-anchor="middle" fill="#8585B1" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">A</text>

<!-- sep y=86 -->
<rect x="0" y="86" width="320" height="1" fill="#2C2C58"/>

<!-- Param name -->
<text x="160" y="101" text-anchor="middle" fill="#8585B1" font-size="14" font-family="'Segoe UI',Arial,sans-serif">K_MULT calibration</text>
<text x="160" y="117" text-anchor="middle" fill="#8585B1" font-size="13" font-family="'Segoe UI',Arial,sans-serif">default=16   range=1-255</text>

<!-- Current value -->
<text x="160" y="147" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">= 16</text>

<!-- Slider row: [-] x=4 slider x=40,w=232 [+] x=286 -->
<rect x="4"  y="156" width="30" height="26" rx="4" fill="#2C2C2C"/>
<text x="19" y="173" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">−</text>

<rect x="40" y="163" width="232" height="12" rx="6" fill="#2C2C2C"/>
<rect x="40" y="163" width="14"  height="12" rx="6" fill="#2255AA"/>
<circle cx="54" cy="169" r="10" fill="#88BBFF"/>

<rect x="286" y="156" width="30" height="26" rx="4" fill="#2C2C2C"/>
<text x="301" y="173" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">+</text>

<!-- sep y=183 -->
<rect x="0" y="183" width="320" height="1" fill="#2C2C58"/>

<!-- SEND button -->
<rect x="8"   y="200" width="304" height="36" rx="10" fill="#004400"/>
<text x="160" y="222" text-anchor="middle" fill="#000000" font-size="14" font-weight="600" font-family="'Segoe UI',Arial,sans-serif">SEND   K16</text>

</svg>
